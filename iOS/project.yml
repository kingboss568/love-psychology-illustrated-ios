name: VisualGuideFamily
options:
  minimumXcodeGenVersion: 2.42.0
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  VisualGuideCore:
    type: framework
    platform: iOS
    sources:
      - path: AppCore
      - path: ContentKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jiang.visualguide.core
    info:
      path: AppCore/VisualGuideCore-Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
  LovePsychology:
    type: application
    platform: iOS
    sources:
      - path: LovePsychologyUIKit
      - path: PurchaseKit/PurchaseStore.swift
      - path: ../data/apps
        type: folder
        buildPhase: resources
      - path: ../data/apps_manifest.json
        buildPhase: resources
      - path: LovePsychologyApp/Assets.xcassets
        buildPhase: resources
      - path: LovePsychologyApp/Resources/DiagramAssets
        type: folder
        buildPhase: resources
      - path: LovePsychologyApp/Resources/Configuration.storekit
        buildPhase: resources
      - path: LovePsychologyApp/Resources/PrivacyInfo.xcprivacy
        buildPhase: resources
    dependencies:
      - target: VisualGuideCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jiang.visualguide.lovepsychology
        PRODUCT_NAME: 戀愛心理全圖解
        PRODUCT_MODULE_NAME: LovePsychology
        DEVELOPMENT_TEAM: "7H7ZUG2WX8"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_USER_SCRIPT_SANDBOXING: NO
    info:
      path: LovePsychologyApp/Info.plist
      properties:
        CFBundleDisplayName: 戀愛心理全圖解
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UIRequiresFullScreen: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneDelegateClassName: "$(PRODUCT_MODULE_NAME).SceneDelegate"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
  VisualGuideCoreTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: VisualGuideCoreTests
    dependencies:
      - target: VisualGuideCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jiang.visualguide.core.tests
schemes:
  LovePsychology:
    build:
      targets:
        LovePsychology: all
        VisualGuideCoreTests: [test]
    test:
      targets:
        - VisualGuideCoreTests
  VisualGuideCore:
    build:
      targets:
        VisualGuideCore: all
        VisualGuideCoreTests: [test]
    test:
      targets:
        - VisualGuideCoreTests
